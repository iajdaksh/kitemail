<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lost in the Wind — KiteMail</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪁</text></svg>" />
  <link rel="stylesheet" href="/css/main.css" />
  <style>
    .lost-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .lost-kite { font-size: 80px; display: inline-block; animation: kiteFloat 4s ease-in-out infinite; margin-bottom: 24px; opacity: 0.6; }
    .lost-code { font-family: 'Cormorant Garamond', serif; font-size: 120px; font-weight: 300; color: rgba(201,169,110,0.15); line-height: 1; margin-bottom: -20px; }
    .lost-title { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: var(--cream); margin-bottom: 12px; }
    .lost-sub { font-size: 14px; color: var(--muted-2); margin-bottom: 40px; }
  </style>
</head>
<body>
  <div class="stars-bg"></div>
  <div class="ambient ambient-1"></div>

  <nav class="nav">
    <a href="/" class="nav-logo"><span class="kite-icon">🪁</span> Kite<span>Mail</span></a>
    <ul class="nav-links">
      <li><a href="/about">About</a></li>
      <li><a href="/find">Find a Kite</a></li>
      <li><a href="/fly" class="nav-cta">Fly a Kite</a></li>
    </ul>
    <button class="nav-hamburger">☰</button>
  </nav>

  <div class="page-wrap">
    <div class="lost-page">
      <div class="fade-in">
        <div class="lost-kite">🪁</div>
        <div class="lost-code">404</div>
        <h1 class="lost-title">Lost in the wind</h1>
        <p class="lost-sub">This page drifted away. Maybe it was never here to begin with.</p>
        <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
          <a href="/" class="btn btn-primary">← Back Home</a>
          <a href="/find" class="btn btn-outline">Find My Kite</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
